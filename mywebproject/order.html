<!DOCTYPE html>
<html>
<head>
    <title>Order Online - Grand Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>Order Online</h1>
    <p>Place your order here</p>
</div>

<div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="menu.html">Menu</a>
    <a href="order.html">Order</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact Us</a>
</div>

<div class="container">
    <h2>Order Form</h2>
    <form action="save_order.php" method="post">
        
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" name="fullname" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label>Phone:</label>
            <input type="tel" name="phone" required>
        </div>
        
        <div class="form-group">
            <label>Select Menu Item:</label>
            <select name="menu_item" required>
                <option value="">-- Select --</option>
                <option value="Grilled Tilapia">Grilled Tilapia - 12,000 RWF</option>
                <option value="Fish Curry">Fish Curry - 10,000 RWF</option>
                <option value="Fried Fish">Fried Fish - 8,000 RWF</option>
                <option value="Fish Burger">Fish Burger - 7,000 RWF</option>
                <option value="Fresh Juice">Fresh Juice - 3,000 RWF</option>
                <option value="Smoothie">Smoothie - 4,000 RWF</option>
                <option value="Pizza">Pizza - 15,000 RWF</option>
                <option value="Burger">Burger - 5,000 RWF</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Delivery Address:</label>
            <textarea name="address" rows="3" required></textarea>
        </div>
        
        <div class="form-group">
            <label>Delivery Date:</label>
            <input type="date" name="order_date" required>
        </div>
        
        <button type="submit">Place Order</button>
        
    </form>
</div>

    <p>&copy; 2024 Grand Hotel. All rights reserved.</p>
</div>

</body>
</html>
